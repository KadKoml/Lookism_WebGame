global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'api-gateway'
    static_configs:
      - targets: ['host.docker.internal:8080']

  - job_name: 'gacha-service'
    static_configs:
      - targets: ['host.docker.internal:50051']

  - job_name: 'combat-service'
    static_configs:
      - targets: ['host.docker.internal:50052']
